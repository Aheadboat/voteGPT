name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: votegpt_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d votegpt_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      BETTER_AUTH_SECRET: ci-test-secret-at-least-thirty-two-characters
      BETTER_AUTH_URL: http://127.0.0.1:3000
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/votegpt_test
      EMAIL_FROM: voteGPT CI <noreply@example.com>
      EMAIL_SERVER: smtp://127.0.0.1:2525
      GOOGLE_CLIENT_ID: ci-google-client
      GOOGLE_CLIENT_SECRET: ci-google-secret
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate and apply database migrations
        run: npm run db:check && npm run db:migrate

      - name: Run PostgreSQL auth contract
        run: npm run test:postgres

      - name: Run non-E2E checks
        run: npm run check

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Provision and run marked destructive E2E tests
        shell: bash
        env:
          PGPASSWORD: postgres
        run: |
          marker="$(openssl rand -hex 32)"
          echo "::add-mask::$marker"
          database_scheme="postgresql"
          database_user="postgres"
          database_host="127.0.0.1"
          database_port="5432"
          database_name="votegpt_e2e"
          e2e_database_url="${database_scheme}://${database_user}:${PGPASSWORD}@${database_host}:${database_port}/${database_name}"
          echo "::add-mask::$e2e_database_url"
          psql -h 127.0.0.1 -U postgres -d postgres -c 'CREATE DATABASE votegpt_e2e'
          psql -h 127.0.0.1 -U postgres -d votegpt_e2e -v ON_ERROR_STOP=1 -v marker="$marker" <<'SQL'
          CREATE TABLE e2e_database_guard (id integer PRIMARY KEY, marker text NOT NULL);
          INSERT INTO e2e_database_guard (id, marker) VALUES (1, :'marker');
          SQL
          E2E_DATABASE_MARKER="$marker" E2E_DATABASE_URL="$e2e_database_url" E2E_DESTRUCTIVE_OPT_IN="1" npm run test:e2e

      - name: Destroy disposable databases
        if: always()
        env:
          PGPASSWORD: postgres
        run: |
          cleanup_status=0
          psql -h 127.0.0.1 -U postgres -d postgres -c 'DROP DATABASE IF EXISTS votegpt_e2e WITH (FORCE);' || cleanup_status=$?
          psql -h 127.0.0.1 -U postgres -d postgres -c 'DROP DATABASE IF EXISTS votegpt_test WITH (FORCE);' || cleanup_status=$?
          exit "$cleanup_status"
